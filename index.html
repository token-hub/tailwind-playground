<!doctype html>
<html class="tw:dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
        <link rel="stylesheet" href="./src/output.css" />
    </head>
    <body class="tw:bg-blue-600 tw:dark:bg-gray-400">
        <!-- adding the first and last on every child allows browser to determine which is the first and the last -->
        <!-- <ul>
            <li class="py-4 first:pt-0 last:pb-0">23</li>
            <li class="py-4 first:pt-0 last:pb-0">23</li>
            <li class="py-4 first:pt-0 last:pb-0">23</li>
            <li class="py-4 first:pt-0 last:pb-0">23</li>
            <li class="py-4 first:pt-0 last:pb-0">23</li>
        </ul> -->

        <!-- adding only first and last to the actual element works as it is actually intended -->
        <ul>
            <li class="py-4 first:pt-0">23</li>
            <li class="py-4">23</li>
            <li class="py-4">23</li>
            <li class="py-4">23</li>
            <li class="py-4 last:pb-0">23</li>
        </ul>
    </body>
</html>
